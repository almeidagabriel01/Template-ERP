name: Push Checks

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Type check functions
        run: cd functions && npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Lint functions
        run: cd functions && npm run lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Audit frontend dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Audit functions dependencies
        run: cd functions && npm audit --omit=dev --audit-level=critical

  e2e-push:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: 'true'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:demo'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          FIREBASE_STORAGE_EMULATOR_HOST: '127.0.0.1:9199'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.ref_name }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.ref_name }}-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  firestore-rules-push:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run Firestore rules tests
        run: firebase emulators:exec --only firestore --project demo-proops-test "npm run test:rules"
        env:
          CI: true

  performance-push:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e-push]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run performance tests
        run: npm run test:performance
        env:
          CI: true
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: 'true'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:demo'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          FIREBASE_STORAGE_EMULATOR_HOST: '127.0.0.1:9199'

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.ref_name }}-${{ github.run_number }}
          path: performance-report/
          retention-days: 7

  security-scan-push:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e-push]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Build Next.js for ZAP scan
        run: npm run build
        env:
          FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'

      - name: Start Next.js production server
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: 'true'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:demo'

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Prepare ZAP working directory
        run: |
          touch zap.yaml
          chmod 777 zap.yaml

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap-rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false
          artifact_name: zap-scan-push

      - name: Upload security scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report-${{ github.ref_name }}-${{ github.run_number }}
          path: security-report/
          retention-days: 7

  push-gate:
    name: Push Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - type-check
      - lint
      - security-audit
      - e2e-push
      - firestore-rules-push
      - performance-push
      - security-scan-push
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "type-check=${{ needs.type-check.result }}"
            "lint=${{ needs.lint.result }}"
            "security-audit=${{ needs.security-audit.result }}"
            "e2e-push=${{ needs.e2e-push.result }}"
            "firestore-rules-push=${{ needs.firestore-rules-push.result }}"
            "performance-push=${{ needs.performance-push.result }}"
            "security-scan-push=${{ needs.security-scan-push.result }}"
          )

          failed=()
          for entry in "${results[@]}"; do
            job="${entry%%=*}"
            result="${entry##*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              failed+=("$job ($result)")
            fi
          done

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "✗ The following jobs failed:"
            for f in "${failed[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

          echo "✓ All checks passed"
