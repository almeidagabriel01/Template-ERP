name: Test Suite

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Type check functions
        run: cd functions && npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Lint functions
        run: cd functions && npm run lint

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: 'true'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:demo'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          FIREBASE_STORAGE_EMULATOR_HOST: '127.0.0.1:9199'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr${{ github.event.number }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-pr${{ github.event.number }}-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run performance tests
        run: npm run test:performance
        env:
          CI: true
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: 'true'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:demo'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          FIREBASE_STORAGE_EMULATOR_HOST: '127.0.0.1:9199'

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report/
          retention-days: 14

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Build Next.js for ZAP scan
        run: npm run build
        env:
          FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'

      - name: Start Next.js production server
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: 'true'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-proops-test
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-proops-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-proops-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:demo'

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Prepare ZAP workspace
        run: |
          touch zap.yaml
          chmod 777 zap.yaml
          touch report_json.json report_md.md report_html.html
          chmod 777 report_json.json report_md.md report_html.html

      - name: ZAP Baseline Scan
        run: |
          docker run --network=host \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -c .zap-rules.tsv \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            -a -j \
            -I
        # -c = rules config file (suppresses known false positives)
        # -I = informational mode: WARNs don't fail the job, only FAILs do

      - name: Check ZAP results
        run: |
          FAILS=$(cat report_json.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          fails=[a for a in data.get('site',[{}])[0].get('alerts',[])
                 if a.get('riskcode','0') >= '3']
          print(len(fails))
          " 2>/dev/null || echo "0")
          echo "ZAP FAIL count: $FAILS"
          if [ "$FAILS" -gt "0" ]; then
            echo "ZAP found $FAILS FAIL-level vulnerabilities"
            exit 1
          fi
          echo "ZAP scan passed — no FAIL-level vulnerabilities found"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-pr-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 7

  firestore-rules:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run Firestore rules tests
        run: firebase emulators:exec --only firestore --project demo-proops-test "npm run test:rules"
        env:
          CI: true

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [type-check, lint, e2e, performance, firestore-rules, security]
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "type-check=${{ needs.type-check.result }}"
            "lint=${{ needs.lint.result }}"
            "e2e=${{ needs.e2e.result }}"
            "performance=${{ needs.performance.result }}"
            "firestore-rules=${{ needs.firestore-rules.result }}"
            "security=${{ needs.security.result }}"
          )

          failed=()
          for entry in "${results[@]}"; do
            job="${entry%%=*}"
            result="${entry##*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              failed+=("$job ($result)")
            fi
          done

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "✗ The following jobs failed:"
            for f in "${failed[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

          echo "✓ All checks passed"
